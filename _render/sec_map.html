<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MRA SEC Map Builder</title>
<style>
  :root { --cell: 60px; --bg:#16171c; --panel:#1f2128; --line:#2c2f38; --txt:#d7dae2; --accent:#5aa9ff; }
  * { box-sizing: border-box; }
  body { margin:0; font:13px/1.4 system-ui,Segoe UI,Arial,sans-serif; background:var(--bg); color:var(--txt); }
  header { display:flex; gap:12px; align-items:center; padding:8px 12px; background:var(--panel); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:20; }
  header h1 { font-size:15px; margin:0; font-weight:600; }
  header .sp { flex:1; }
  button, input[type=search] { background:#2a2d36; color:var(--txt); border:1px solid var(--line); border-radius:6px; padding:6px 10px; font-size:13px; }
  button:hover { border-color:var(--accent); cursor:pointer; }
  .wrap { display:flex; height:calc(100vh - 49px); }
  .gridpane { flex:1; overflow:auto; padding:24px; }
  .palette { width:280px; flex:none; background:var(--panel); border-left:1px solid var(--line); overflow:auto; padding:10px; }
  .palette h2 { font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:#9aa0ad; margin:14px 0 6px; }
  .region { font-size:11px; color:#8b93a3; margin:10px 0 4px; border-bottom:1px solid var(--line); padding-bottom:2px; }
  .tiles { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; }
  .tile { width:100%; aspect-ratio:1; image-rendering:auto; border:1px solid var(--line); border-radius:3px; cursor:grab; background:#000; }
  .tilewrap { position:relative; }
  .tilewrap.used .tile { opacity:.30; border-color:#3a7d3a; }
  .tilewrap.used .nm { color:#67d67d; }
  .tilewrap.used::after { content:'\2713'; position:absolute; top:1px; right:1px; z-index:3;
    font-size:9px; line-height:14px; width:14px; height:14px; text-align:center;
    color:#0b1f0e; background:#67d67d; border-radius:50%; font-weight:700; }
  .tilewrap .nm { font-size:8px; color:#7e8696; text-align:center; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
  /* grid */
  .grid { display:grid; gap:1px; background:var(--line); border:1px solid var(--line); width:max-content; }
  .colhdr, .rowhdr { background:var(--panel); color:#9aa0ad; font-size:10px; display:flex; align-items:center; justify-content:center; }
  .cell { width:var(--cell); height:var(--cell); background:#101116; position:relative; }
  .cell .guide { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; text-align:center; font-size:8px; color:#5d6470; padding:2px; pointer-events:none; }
  .cell img { position:absolute; inset:0; width:100%; height:100%; image-rendering:auto; }
  .cell.coord img { outline:1px solid #3a7d3a; }
  .cell.area img { outline:2px solid var(--accent); }
  .cell.dragover { background:#243; }
  .cell .x { position:absolute; top:0; right:1px; font-size:10px; color:#ff6b6b; cursor:pointer; display:none; z-index:3; }
  .cell:hover .x { display:block; }
  .cell .badge { position:absolute; bottom:0; left:1px; font-size:8px; letter-spacing:1px; z-index:3; color:#566; }
  .cell .badge b { color:#ffd166; }
  .cell .label { position:absolute; top:0; left:0; right:0; font-size:8px; line-height:1.2; z-index:2;
    background:rgba(0,0,0,.6); color:#fff; text-align:center; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; padding:1px; }
  .zoom { display:flex; gap:3px; align-items:center; }
  .zoom button { padding:4px 9px; font-weight:600; }
  .legend { font-size:11px; color:#9aa0ad; }
  .void .guide { color:#3a3f49; }
  .cell { cursor:pointer; }
  .cell.hassug::after { content:''; position:absolute; top:2px; left:2px; width:5px; height:5px;
    border-radius:50%; background:#ffd166; z-index:4; }
  .cell.cleared::before { content:''; position:absolute; inset:2px; z-index:1;
    outline:1px dashed #5a5f6b; outline-offset:-1px; }
  #pop { position:fixed; z-index:50; background:var(--panel); border:1px solid var(--accent);
    border-radius:8px; padding:10px; box-shadow:0 8px 28px rgba(0,0,0,.6); width:340px; display:none; }
  #pop h3 { margin:0 0 8px; font-size:13px; }
  #pop .ptiles { display:grid; grid-template-columns:repeat(4,1fr); gap:5px; max-height:240px; overflow:auto; }
  #pop .pt { cursor:pointer; text-align:center; }
  #pop .pt img { width:100%; aspect-ratio:1; image-rendering:auto; border:1px solid var(--line); border-radius:3px; }
  #pop .pt:hover img { border-color:var(--accent); }
  #pop .pt span { display:block; font-size:8px; color:#9aa0ad; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
  #pop .x2 { float:right; cursor:pointer; color:#9aa0ad; }
  #pop .cur { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
  #pop .cur img { width:54px; height:54px; image-rendering:auto; border:1px solid var(--line); border-radius:4px; background:#000; flex:none; }
  #pop .cur .meta { font-size:11px; color:#c2c7d2; }
  #pop .cur .meta b { color:#fff; }
  #pop .cur .empty { font-size:11px; color:#7e8696; }
  #pop button.clr { background:#3a2326; border-color:#a3454a; color:#ffb3b3; margin-bottom:8px; width:100%; }
  #pop input.psearch { width:100%; margin:2px 0 6px; }
  #pop .region { margin:4px 0; }
  #hov { position:fixed; z-index:60; pointer-events:none; display:none; background:var(--panel);
    border:1px solid var(--accent); border-radius:8px; padding:6px; box-shadow:0 8px 28px rgba(0,0,0,.6); }
  #hov img { width:192px; height:192px; image-rendering:auto; display:block; border-radius:4px; background:#000; }
  #hov div { font-size:11px; color:var(--txt); text-align:center; margin-top:4px; max-width:192px;
    overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
  .floors { display:flex; gap:3px; }
  .floors button { padding:5px 9px; }
  .floors button.on { border-color:var(--accent); background:#143; color:#fff; }
</style>
</head>
<body>
<header>
  <h1>MRA SEC Map Builder</h1>
  <span class="legend">green = core (auto). blue = your placement. Drag a tile on, or click a cell to edit / replace / blank it. Right-click clears.</span>
  <span class="sp"></span>
  <span class="floors" id="floors"></span>
  <span class="zoom"><button id="zout">-</button><span id="zlvl" class="legend">60</span><button id="zin">+</button></span>
  <label class="legend"><input type="checkbox" id="guides" checked> guide names</label>
  <label class="legend"><input type="checkbox" id="labels"> labels on placed</label>
  <span id="sync" class="legend" title="click to configure sharing" style="cursor:pointer">local only</span>
  <button id="seed" title="auto-fill empty named cells with their best-match tile (draft, reversible)">Seed empty</button>
  <button id="export">Export</button>
</header>
<div id="cfgbar" style="display:none; padding:8px 12px; background:#202a3a; border-bottom:1px solid var(--line); font-size:12px;">
  <b>Shared map (Supabase):</b>
  your name <input id="cfgname" style="width:110px" placeholder="handle">
  &nbsp; URL <input id="cfgurl" style="width:280px" placeholder="https://xxxx.supabase.co">
  &nbsp; anon key <input id="cfgkey" style="width:280px" placeholder="eyJ...">
  <button id="cfgsave">Connect</button>
  <button id="cfgclear">Disconnect</button>
  <span class="legend">&nbsp;Stored in this browser only. Everyone uses the SAME project URL + anon key.</span>
</div>
<div class="wrap">
  <div class="gridpane"><div id="grid" class="grid"></div></div>
  <div class="palette">
    <input type="search" id="filter" placeholder="filter area tiles..." style="width:100%">
    <div id="palettebody"></div>
  </div>
</div>
<div id="pop"></div>
<div id="hov"></div>

<script src="data.js"></script>
<script src="suggestions.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const EW_MIN=10, EW_MAX=100, NS_MIN=15, NS_MAX=90, STEP=5;
const EWS=[], NSS=[];
for(let e=EW_MIN;e<=EW_MAX;e+=STEP) EWS.push(e);
for(let n=NS_MIN;n<=NS_MAX;n+=STEP) NSS.push(n);

// Floors are a z-axis at the same EW/NS: a=under(45) b=ground(50) c=upper(55).
const FLOOR_ORDER=['c','b','a'];                 // topmost-first for "Surface" view
const FLOOR_Z={a:45,b:50,c:55};
const FLOOR_LABEL={surface:'Surface',c:'Upper (c)',b:'Ground (b)',a:'Under (a)'};
let FLOOR='surface';

// coordByCell["ew,ns,layer"] and placements["ew,ns,layer"] -> {filename,png,source,place}
const coordByCell={}, placements={};
(MANIFEST.coordinate||[]).forEach(t=>{
  if(t.mp_x==null||t.mp_y==null) return;
  const lay=t.layer||'b';
  coordByCell[t.mp_x+","+t.mp_y+","+lay]={filename:t.filename,png:t.png,source:"coord",place:t.place_name};
});
function presentLayers(ew,ns){ // layers (any source) at this cell, topmost-first
  return FLOOR_ORDER.filter(l=>coordByCell[ew+","+ns+","+l]||placements[ew+","+ns+","+l]);
}
function displayLayer(ew,ns){
  if(FLOOR!=='surface') return FLOOR;
  const p=presentLayers(ew,ns); return p.length?p[0]:'b';
}
function placeLayer(){ return FLOOR==='surface' ? 'b' : FLOOR; }

// floor selector
const floorsEl=document.getElementById('floors');
['surface','c','b','a'].forEach(f=>{
  const b=document.createElement('button'); b.textContent=FLOOR_LABEL[f];
  if(f===FLOOR) b.classList.add('on');
  b.onclick=()=>{FLOOR=f; [...floorsEl.children].forEach(x=>x.classList.remove('on')); b.classList.add('on'); refreshCells();};
  floorsEl.appendChild(b);
});

const grid=document.getElementById('grid');
function buildGrid(){
  grid.style.gridTemplateColumns=`28px repeat(${EWS.length}, var(--cell))`;
  grid.innerHTML='';
  grid.appendChild(corner(''));
  EWS.forEach(e=>grid.appendChild(hdr('colhdr', e)));
  NSS.forEach(n=>{
    grid.appendChild(hdr('rowhdr', n));
    EWS.forEach(e=>grid.appendChild(makeCell(e,n)));
  });
}
function corner(){ const d=document.createElement('div'); d.className='colhdr'; return d; }
function hdr(cls,v){ const d=document.createElement('div'); d.className=cls; d.textContent=v; return d; }
const CELLS={}; // "ew,ns" -> element
function makeCell(ew,ns){
  const key=ew+","+ns;
  const c=document.createElement('div');
  c.className='cell'; c.dataset.ew=ew; c.dataset.ns=ns; CELLS[key]=c;
  const lname=(window.LAYOUT||{})[key];
  if(lname){ const g=document.createElement('div'); g.className='guide'; g.textContent=lname; c.appendChild(g);
    if(lname==='Void'||lname==='Empty'||lname.startsWith('River')) c.classList.add('void'); }
  c.addEventListener('dragover',e=>{e.preventDefault();c.classList.add('dragover');});
  c.addEventListener('dragleave',()=>c.classList.remove('dragover'));
  c.addEventListener('drop',e=>{e.preventDefault();c.classList.remove('dragover');
    const fn=e.dataTransfer.getData('fn'), png=e.dataTransfer.getData('png');
    if(fn){ setPlacement(ew,ns,placeLayer(),{filename:fn,png,source:'area'}); }});
  const sug=(window.SUGGESTIONS||{})[key];
  if(sug && sug.candidates && sug.candidates.length) c.classList.add('hassug');
  c.addEventListener('click',e=>{ if(e.target.classList.contains('x')) return; openEditor(ew,ns,e); });
  c.addEventListener('contextmenu',e=>{ e.preventDefault(); quickClear(ew,ns); });
  renderCell(ew,ns);
  return c;
}
// single funnel for placement edits, so they also sync to the shared DB
function setPlacement(ew,ns,lay,rec){
  const ck=ew+","+ns+","+lay;
  placements[ck]=rec; renderCell(ew,ns); markUsed();
  DB.upsert(ck,ew,ns,lay,rec.filename);
}
function removePlacement(ck){
  const [ew,ns]=ck.split(',');
  delete placements[ck]; renderCell(+ew,+ns); markUsed();
  DB.remove(ck);
}
// apply a change that arrived FROM the DB (no echo back)
function applyRemote(ck,rec){
  const [ew,ns]=ck.split(',');
  if(rec){ const t=AREA_BY_NAME[rec.filename]; placements[ck]={filename:rec.filename, png:t?t.png:'', source:'area'}; }
  else delete placements[ck];
  renderCell(+ew,+ns); markUsed();
}
function renderCell(ew,ns){
  const c=CELLS[ew+","+ns]; if(!c) return;
  [...c.querySelectorAll('img,.x,.badge')].forEach(n=>n.remove());
  c.classList.remove('coord','area','cleared');
  const lay=displayLayer(ew,ns), ck=ew+","+ns+","+lay;
  const p=placements[ck]||coordByCell[ck];
  if(p && p.filename===CLEARED){ c.classList.add('cleared'); }
  else if(p){
    const im=document.createElement('img'); im.src=p.png; im.title=(p.place||'')+' '+p.filename+' ['+lay+']';
    attachHover(im,p.png,p.filename); c.appendChild(im);
    c.classList.add(p.source);
    if(p.source==='area'){ const x=document.createElement('div'); x.className='x'; x.textContent='x';
      x.onclick=(ev)=>{ev.stopPropagation();removePlacement(ck);}; c.appendChild(x); }
  }
  if(p && p.filename!==CLEARED && SHOWLABELS){
    const lab=document.createElement('div'); lab.className='label';
    lab.textContent=(window.LAYOUT||{})[ew+","+ns] || p.filename.replace('.SEC','');
    c.appendChild(lab);
  }
  const present=presentLayers(ew,ns);
  if(present.length>1 || (present.length===1 && present[0]!=='b')){
    const bd=document.createElement('div'); bd.className='badge';
    bd.innerHTML=FLOOR_ORDER.filter(l=>present.includes(l)).map(l=>l===lay?'<b>'+l+'</b>':l).join('');
    c.appendChild(bd);
  }
}
// ---- cell editor popover: view / replace / blank any cell ----------------
const pop=document.getElementById('pop');
const CLEARED='__cleared__';   // placement sentinel: blank an unwanted core tile
function tileGrid(items,ew,ns,lay){
  const g=document.createElement('div'); g.className='ptiles';
  items.forEach(cd=>{
    const t=document.createElement('div'); t.className='pt';
    const im=document.createElement('img'); im.src=cd.png; im.title=cd.filename;
    attachHover(im,cd.png,cd.filename);
    const nm=document.createElement('span'); nm.textContent=cd.filename.replace('.SEC','');
    t.appendChild(im); t.appendChild(nm);
    t.onclick=()=>{ setPlacement(ew,ns,lay,{filename:cd.filename,png:cd.png,source:'area'}); pop.style.display='none'; };
    g.appendChild(t);
  });
  return g;
}
function openEditor(ew,ns,evt){
  const key=ew+","+ns, lay=placeLayer(), ck=ew+","+ns+","+lay;
  const placed=placements[ck], core=coordByCell[ck];
  const cur=placed||core;
  const lname=(window.LAYOUT||{})[key]||'(unnamed)';
  const sug=(window.SUGGESTIONS||{})[key];
  pop.innerHTML='';
  const h=document.createElement('h3');
  h.innerHTML='<span class="x2">close</span>'+lname+
    ' <span class="legend">('+ew+','+ns+', floor '+lay+')</span>';
  pop.appendChild(h);
  h.querySelector('.x2').onclick=()=>pop.style.display='none';
  // current contents
  const curDiv=document.createElement('div'); curDiv.className='cur';
  if(cur && cur.filename!==CLEARED){
    const im=document.createElement('img'); im.src=cur.png; attachHover(im,cur.png,cur.filename); curDiv.appendChild(im);
    const m=document.createElement('div'); m.className='meta';
    m.innerHTML='<b>'+(placed?'your placement':'core (auto)')+'</b><br>'+cur.filename.replace('.SEC','');
    curDiv.appendChild(m);
  } else {
    const m=document.createElement('div'); m.className='empty';
    m.textContent=(cur && cur.filename===CLEARED)?'(blanked - core tile hidden)':'(empty)';
    curDiv.appendChild(m);
  }
  pop.appendChild(curDiv);
  // clear / blank / restore
  const clr=document.createElement('button'); clr.className='clr';
  if(placed && placed.filename!==CLEARED){
    clr.textContent='Remove placement'; clr.onclick=()=>{removePlacement(ck); openEditor(ew,ns,evt);};
  } else if(placed && placed.filename===CLEARED){
    clr.textContent='Restore core tile'; clr.onclick=()=>{removePlacement(ck); openEditor(ew,ns,evt);};
  } else if(core){
    clr.textContent='Blank this core tile'; clr.onclick=()=>{setPlacement(ew,ns,lay,{filename:CLEARED,png:'',source:'area'}); openEditor(ew,ns,evt);};
  } else { clr.style.display='none'; }
  pop.appendChild(clr);
  // suggestions for this named cell
  if(sug && sug.candidates && sug.candidates.length){
    const sh=document.createElement('div'); sh.className='region'; sh.textContent='Suggested for "'+sug.place_name+'"';
    pop.appendChild(sh);
    pop.appendChild(tileGrid(sug.candidates.map(c=>({filename:c.filename,png:c.png})),ew,ns,lay));
  }
  // free search over every area tile
  const inp=document.createElement('input'); inp.className='psearch'; inp.placeholder='search any area tile to place...';
  pop.appendChild(inp);
  const results=document.createElement('div'); pop.appendChild(results);
  inp.addEventListener('input',()=>{
    const q=inp.value.toLowerCase().trim(); results.innerHTML='';
    if(!q) return;
    results.appendChild(tileGrid((MANIFEST.area||[]).filter(t=>t.filename.toLowerCase().includes(q)).slice(0,40),ew,ns,lay));
  });
  pop.style.display='block';
  const x=Math.min(evt.clientX+8, innerWidth-356), y=Math.min(evt.clientY+8, innerHeight-440);
  pop.style.left=x+'px'; pop.style.top=Math.max(8,y)+'px';
  inp.focus();
}
function quickClear(ew,ns){
  const lay=placeLayer(), ck=ew+","+ns+","+lay;
  if(placements[ck]) removePlacement(ck);
  else if(coordByCell[ck]) setPlacement(ew,ns,lay,{filename:CLEARED,png:'',source:'area'});
}
document.addEventListener('click',e=>{ if(!pop.contains(e.target) &&
  !e.target.classList.contains('cell') && !e.target.closest('.cell')) pop.style.display='none'; });

// hover zoom preview for palette tiles + placed cell tiles
const hov=document.getElementById('hov');
function attachHover(imgEl,png,filename){
  if(!png) return;
  imgEl.addEventListener('mouseenter',()=>{ hov.innerHTML='';
    const i=document.createElement('img'); i.src=png;
    const d=document.createElement('div'); d.textContent=filename.replace('.SEC','');
    hov.appendChild(i); hov.appendChild(d); hov.style.display='block'; });
  imgEl.addEventListener('mousemove',e=>{
    hov.style.left=Math.min(e.clientX+16,innerWidth-220)+'px';
    hov.style.top=Math.min(e.clientY+16,innerHeight-240)+'px'; });
  imgEl.addEventListener('mouseleave',()=>{ hov.style.display='none'; });
}

// zoom + labels
let SHOWLABELS=false, ZOOM=60;
function setZoom(px){ ZOOM=Math.max(24,Math.min(160,px));
  document.documentElement.style.setProperty('--cell',ZOOM+'px');
  document.getElementById('zlvl').textContent=ZOOM; }
document.getElementById('zin').onclick=()=>setZoom(ZOOM+12);
document.getElementById('zout').onclick=()=>setZoom(ZOOM-12);
document.getElementById('labels').addEventListener('change',e=>{ SHOWLABELS=e.target.checked; refreshCells(); });
function refreshCells(){ NSS.forEach(n=>EWS.forEach(e=>renderCell(e,n))); }
buildGrid();

// palette
const pbody=document.getElementById('palettebody');
const byRegion={}, AREA_BY_NAME={};
(MANIFEST.area||[]).forEach(t=>{ (byRegion[t.region||'?']=byRegion[t.region||'?']||[]).push(t); AREA_BY_NAME[t.filename]=t; });
function buildPalette(filter=''){
  pbody.innerHTML='';
  Object.keys(byRegion).sort().forEach(reg=>{
    const items=byRegion[reg].filter(t=>t.filename.toLowerCase().includes(filter));
    if(!items.length) return;
    const h=document.createElement('div'); h.className='region'; h.textContent=reg+' ('+items.length+')'; pbody.appendChild(h);
    const wrap=document.createElement('div'); wrap.className='tiles';
    items.forEach(t=>{
      const tw=document.createElement('div'); tw.className='tilewrap';
      const im=document.createElement('img'); im.className='tile'; im.src=t.png; im.draggable=true;
      im.dataset.fn=t.filename; im.title=t.filename;
      im.addEventListener('dragstart',e=>{e.dataTransfer.setData('fn',t.filename);e.dataTransfer.setData('png',t.png);});
      attachHover(im,t.png,t.filename);
      const nm=document.createElement('div'); nm.className='nm'; nm.textContent=t.filename.replace('.SEC','');
      tw.appendChild(im); tw.appendChild(nm); wrap.appendChild(tw);
    });
    pbody.appendChild(wrap);
  });
  markUsed();
}
function markUsed(){
  const used=new Set(Object.values(placements).map(p=>p.filename).filter(f=>f!==CLEARED));
  pbody.querySelectorAll('.tilewrap').forEach(tw=>{ const im=tw.querySelector('img.tile');
    tw.classList.toggle('used', !!im && used.has(im.dataset.fn)); });
}
buildPalette();
document.getElementById('filter').addEventListener('input',e=>buildPalette(e.target.value.toLowerCase()));
document.getElementById('guides').addEventListener('change',e=>{
  document.querySelectorAll('.guide').forEach(g=>g.style.display=e.target.checked?'flex':'none');});

// ---- shared persistence (Supabase) ---------------------------------------
// Baked-in community project (publishable key is safe for client use; RLS
// limits it to the placements table). Users can still override via the config
// bar (saved per-browser in localStorage).
const SUPABASE_URL = "https://msnxqnqqpdwamzfbwskm.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_MjRmbztlv0wlOQXpTvoBlQ__BJobsxC";
const TABLE = "placements";

const DB = {
  client:null, ready:false, name:"anon",
  cfg(){ return {
    url: localStorage.getItem('mra_url') || SUPABASE_URL,
    key: localStorage.getItem('mra_key') || SUPABASE_ANON_KEY,
    name: localStorage.getItem('mra_name') || 'anon' }; },
  status(t){ const el=document.getElementById('sync'); el.textContent=t;
    el.style.color = this.ready ? '#67d67d' : '#9aa0ad'; },
  async connect(){
    const c=this.cfg(); this.name=c.name;
    if(!c.url || !c.key || !window.supabase){ this.ready=false; this.status('local only'); return; }
    try{
      this.client = window.supabase.createClient(c.url, c.key, {realtime:{params:{eventsPerSecond:5}}});
      const {data,error} = await this.client.from(TABLE).select('*');
      if(error) throw error;
      (data||[]).forEach(r=>applyRemote(r.cell, r));
      this.client.channel('rt-'+TABLE)
        .on('postgres_changes',{event:'*',schema:'public',table:TABLE},p=>{
          if(p.eventType==='DELETE') applyRemote(p.old.cell, null);
          else applyRemote(p.new.cell, p.new);
        }).subscribe();
      this.ready=true; this.status('shared: '+this.name+' ('+(data?data.length:0)+' placed)');
    }catch(e){ this.ready=false; this.status('connect failed'); console.error(e); }
  },
  upsert(cell,ew,ns,lay,filename){ if(!this.ready) return;
    this.client.from(TABLE).upsert({cell, filename, mp_x:ew, mp_y:ns, layer:lay,
      mp_z:FLOOR_Z[lay]||50, place_name:(window.LAYOUT||{})[ew+","+ns]||null,
      updated_by:this.name, updated_at:new Date().toISOString()}).then(({error})=>{ if(error) console.error(error); }); },
  remove(cell){ if(!this.ready) return;
    this.client.from(TABLE).delete().eq('cell',cell).then(({error})=>{ if(error) console.error(error); }); },
};

const syncEl=document.getElementById('sync'), cfgbar=document.getElementById('cfgbar');
syncEl.onclick=()=>{ cfgbar.style.display = cfgbar.style.display==='none'?'block':'none';
  document.getElementById('cfgname').value=localStorage.getItem('mra_name')||'';
  document.getElementById('cfgurl').value=localStorage.getItem('mra_url')||'';
  document.getElementById('cfgkey').value=localStorage.getItem('mra_key')||''; };
document.getElementById('cfgsave').onclick=()=>{
  localStorage.setItem('mra_name',document.getElementById('cfgname').value.trim()||'anon');
  localStorage.setItem('mra_url',document.getElementById('cfgurl').value.trim());
  localStorage.setItem('mra_key',document.getElementById('cfgkey').value.trim());
  cfgbar.style.display='none'; DB.connect(); };
document.getElementById('cfgclear').onclick=()=>{
  localStorage.removeItem('mra_url'); localStorage.removeItem('mra_key');
  location.reload(); };
DB.connect();

document.getElementById('export').addEventListener('click',()=>{
  const out=Object.entries(placements).filter(([k,p])=>p.filename!==CLEARED).map(([k,p])=>{
    const [ew,ns,lay]=k.split(',');
    return {filename:p.filename, mp_x:+ew, mp_y:+ns, layer:lay, mp_z:FLOOR_Z[lay]||50,
            place_name:(window.LAYOUT||{})[ew+","+ns]||null};
  }).sort((a,b)=>a.mp_y-b.mp_y||a.mp_x-b.mp_x||a.layer.localeCompare(b.layer));
  const blob=new Blob([JSON.stringify({area_placements:out},null,1)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='area_placements.json'; a.click();
});

// draft seeder: fill empty named cells with their best-match suggestion.
// Distinct file per cell (greedy) so regions aren't filled with one repeated
// tile. Skips cells already holding a core or placed tile. Fully reversible.
document.getElementById('seed').addEventListener('click',()=>{
  const cells=Object.entries(window.SUGGESTIONS||{}).filter(([k,s])=>s.candidates&&s.candidates.length)
    .sort((a,b)=>{const A=a[0].split(',').map(Number),B=b[0].split(',').map(Number);return A[1]-B[1]||A[0]-B[0];});
  if(!cells.length){ alert('No suggestions loaded.'); return; }
  if(!confirm('Auto-fill empty named cells with their best-match tile (draft)?\n\nThis writes to the shared map. Every cell stays editable - click to replace, right-click to clear.')) return;
  const used=new Set(Object.values(placements).map(p=>p.filename));
  let n=0;
  cells.forEach(([key,s])=>{
    const [ew,ns]=key.split(',').map(Number), lay='b', ck=ew+','+ns+','+lay;
    if(placements[ck]||coordByCell[ck]) return;
    const pick=s.candidates.find(c=>!used.has(c.filename))||s.candidates[0];
    if(!pick) return;
    used.add(pick.filename);
    const t=AREA_BY_NAME[pick.filename];
    setPlacement(ew,ns,lay,{filename:pick.filename,png:t?t.png:('tiles/'+pick.filename+'.png'),source:'area'});
    n++;
  });
  alert('Seeded '+n+' cells (draft). Refine by clicking any cell.');
});
</script>
