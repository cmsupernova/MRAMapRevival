<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MRA SEC Map</title>
<style>
  :root { --cell: 60px; --bg:#16171c; --panel:#1f2128; --line:#2c2f38; --txt:#d7dae2; --accent:#5aa9ff; }
  * { box-sizing: border-box; }
  body { margin:0; font:13px/1.4 system-ui,Segoe UI,Arial,sans-serif; background:var(--bg); color:var(--txt); }
  header { display:flex; gap:10px; align-items:center; padding:8px 12px; background:var(--panel); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:20; flex-wrap:wrap; }
  header h1 { font-size:15px; margin:0; font-weight:600; }
  header .sp { flex:1; }
  button, input[type=search], input[type=number] { background:#2a2d36; color:var(--txt); border:1px solid var(--line); border-radius:6px; padding:6px 10px; font-size:13px; }
  button:hover { border-color:var(--accent); cursor:pointer; }
  button.on { border-color:var(--accent); background:#143; color:#fff; }
  .floors { display:flex; gap:3px; align-items:center; flex-wrap:wrap; }
  .floors button { padding:5px 9px; }
  .wrap { display:flex; height:calc(100vh - 90px); }
  .gridpane { flex:1; overflow:auto; padding:24px; }
  .palette { width:300px; flex:none; background:var(--panel); border-left:1px solid var(--line); overflow:auto; padding:10px; }
  .region { font-size:11px; color:#8b93a3; margin:10px 0 4px; border-bottom:1px solid var(--line); padding-bottom:2px; }
  .legend { font-size:11px; color:#9aa0ad; }
  .grid { display:grid; gap:1px; background:var(--line); border:1px solid var(--line); width:max-content; }
  .colhdr, .rowhdr { background:var(--panel); color:#9aa0ad; font-size:10px; display:flex; align-items:center; justify-content:center; }
  .cell { width:var(--cell); height:var(--cell); background:#101116; position:relative; cursor:pointer; }
  .cell .guide { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; text-align:center; font-size:8px; color:#5d6470; padding:2px; pointer-events:none; }
  .cell img { position:absolute; inset:0; width:100%; height:100%; image-rendering:auto; }
  .cell.s2011 img { outline:2px solid var(--accent); }
  .cell.s2006 img { outline:1px solid #3a7d3a; }
  .cell.dragover { background:#243; }
  .cell .x { position:absolute; top:0; right:1px; font-size:10px; color:#ff6b6b; cursor:pointer; display:none; z-index:3; }
  .cell:hover .x { display:block; }
  .cell .label { position:absolute; top:0; left:0; right:0; font-size:8px; line-height:1.2; z-index:2;
    background:rgba(0,0,0,.6); color:#fff; text-align:center; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; padding:1px; }
  .cell .conf { position:absolute; bottom:1px; left:1px; font-size:8px; z-index:4; border-radius:4px; padding:0 3px; font-weight:700; }
  .cell .conf.confirmed, .cell .conf.auto_stack { background:#5aa9ff; color:#0a1a2a; }
  .cell .conf.name_anchor { background:#c792ff; color:#1a0f2a; }
  .cell .conf.parked { background:#5d6470; color:#fff; }
  .cell .conf.2006_only, .cell .conf.override { background:#67d67d; color:#0b1f0e; }
  .cell .tpmark { position:absolute; top:1px; left:1px; font-size:8px; z-index:4; color:#0a1a2a; background:#5aa9ff; border-radius:6px; padding:0 3px; font-weight:700; }
  .cell .exitmark { position:absolute; top:1px; right:1px; font-size:9px; z-index:4; color:#1a1208; background:#e8a54b; border-radius:6px; padding:0 3px; font-weight:700; }
  .cell .portmark { position:absolute; bottom:1px; right:1px; font-size:10px; z-index:4; color:#1a0f2a; background:#c792ff; border-radius:6px; padding:0 3px; font-weight:700; }
  .cell .stairmark { position:absolute; bottom:1px; left:1px; font-size:8px; z-index:4; color:#082022; background:#3fe0e0; border-radius:6px; padding:0 3px; font-weight:700; }
  .tiles { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; }
  .tilewrap { position:relative; }
  .tilewrap.used .tile { opacity:.30; border-color:#3a7d3a; }
  .tilewrap .tile { width:100%; aspect-ratio:1; image-rendering:auto; border:1px solid var(--line); border-radius:3px; cursor:grab; background:#000; }
  .tilewrap .nm { font-size:8px; color:#7e8696; text-align:center; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
  .blockcard { border:1px solid var(--line); border-radius:5px; padding:4px; margin:0 0 6px; cursor:grab; background:#1a1c22; }
  .blockcard:hover { border-color:var(--accent); }
  .blockcard.used { opacity:.45; }
  .blockcard .bgrid { display:grid; gap:1px; }
  .blockcard .bgrid img { width:100%; aspect-ratio:1; display:block; background:#000; }
  .blockcard .nm { font-size:9px; color:#7e8696; margin-top:3px; text-align:center; }
  #pop { position:fixed; z-index:50; background:var(--panel); border:1px solid var(--accent);
    border-radius:8px; padding:10px; box-shadow:0 8px 28px rgba(0,0,0,.6); width:340px; display:none; max-height:88vh; overflow:auto; }
  #pop h3 { margin:0 0 8px; font-size:13px; }
  #pop .x2 { float:right; cursor:pointer; color:#9aa0ad; }
  #pop .ptiles { display:grid; grid-template-columns:repeat(4,1fr); gap:5px; max-height:200px; overflow:auto; }
  #pop .pt { cursor:pointer; text-align:center; }
  #pop .pt img { width:100%; aspect-ratio:1; border:1px solid var(--line); border-radius:3px; background:#000; }
  #pop .pt span { display:block; font-size:8px; color:#9aa0ad; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
  #hov { position:fixed; z-index:60; display:none; pointer-events:none; background:#111; border:1px solid var(--line); border-radius:6px; padding:4px; }
  #hov img { width:192px; height:192px; display:block; border-radius:4px; background:#000; }
  a { color:var(--accent); }
</style>
</head>
<body>
<header>
  <h1>MRA SEC Map</h1>
  <span class="legend" id="legendtxt">One map. Floor 0 is the surface. Blue outline = 2011, green = 2006-only.</span>
  <span class="sp"></span>
  <span class="floors" id="floors"></span>
  <span class="zoom">
    <button id="zout">-</button><span id="zlvl" class="legend">60</span><button id="zin">+</button>
  </span>
  <label class="legend"><input type="checkbox" id="guides" checked> guide names</label>
  <label class="legend"><input type="checkbox" id="labels"> labels</label>
  <label class="legend" title="Drag keeps stamped assemblies separate"><input type="checkbox" id="moveassembly" checked> move by assembly</label>
  <label class="legend"><input type="checkbox" id="movepiece"> move single piece</label>
  <span id="sync" class="legend" style="cursor:pointer;color:#9aa0ad" title="click to set handle">local only</span>
  <button id="resetgen" title="Reload generated layout, clear local overrides">Reset to generated</button>
  <button id="export">Export</button>
  <button id="importbtn">Import</button><input id="importfile" type="file" accept=".json" style="display:none">
  <a href="sec_cluster.html" class="legend">cluster detail</a>
  <a href="sec_edit.html" class="legend">SEC editor</a>
</header>
<div id="cfgbar" style="display:none; padding:8px 12px; background:#202a3a; border-bottom:1px solid var(--line); font-size:12px;">
  <span class="legend">handle</span> <input id="cfgname" style="width:140px" placeholder="your name">
  <button id="cfgsave">Connect</button>
  <span class="legend">Uses a new unified placements namespace. Old four-map rows are ignored.</span>
</div>
<div class="wrap">
  <div class="gridpane"><div id="grid" class="grid"></div></div>
  <div class="palette">
    <div id="reviewpanel"></div>
    <input id="filter" type="search" placeholder="search any SEC..." style="width:100%;margin-top:8px">
    <div id="palettebody"></div>
  </div>
</div>
<div id="pop"></div>
<div id="hov"></div>

<script src="data.js"></script>
<script src="blocks.js"></script>
<script src="portals.js"></script>
<script src="level_clusters.js"></script>
<script src="unified_map.js"></script>
<script src="custom_secs.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const U = window.UNIFIED_MAP || {grid:{w:56,h:56},placements:[],guides:{},guide_labels:{},review:{},levels:[0],floor_labels:{'0':'Floor 0'},surface_level:0,_meta:{stats:{}}};
const W = U.grid.w || 56, H = U.grid.h || 56;
const CLEARED = '__cleared__';
const COLS = [...Array(W).keys()], ROWS = [...Array(H).keys()];
const CELLS = {};
let FLOOR = 0, SHOWLABELS = false, ZOOM = 60;
let SHOWGUIDES = true;

// Generated base + local overrides. Key: "col,row,level"
const generated = {};
(U.placements||[]).forEach(p=>{
  generated[p.col+','+p.row+','+p.level] = Object.assign({}, p);
});
let overrides = {}; // same key shape; null means cleared
let INTERIORS = [];
let PORTALS = [];
let IGNORED = {};
let acceptedStacks = {}; // cluster id -> true

const TILE_BY_NAME = {};
((MANIFEST&&MANIFEST.coordinate)||[]).forEach(t=>TILE_BY_NAME[t.filename]=t);
((MANIFEST&&MANIFEST.area)||[]).forEach(t=>TILE_BY_NAME[t.filename]=t);
(U.placements||[]).forEach(p=>{ if(!TILE_BY_NAME[p.filename]) TILE_BY_NAME[p.filename]={filename:p.filename,png:p.png}; });

const BLOCK_BY_ID = {};
((window.BLOCKS&&BLOCKS.blocks)||[]).forEach(b=>{ if(b.pieces.length>=1) BLOCK_BY_ID[b.id]=b; });

function floorLabel(lv){
  return (U.floor_labels&&U.floor_labels[String(lv)]) || (lv===0?'Floor 0':('Floor '+(lv>0?'+':'')+lv));
}
function allLevels(){
  const s = new Set([...(U.levels||[0]), FLOOR]);
  Object.keys(generated).forEach(k=>s.add(+k.split(',')[2]));
  Object.keys(overrides).forEach(k=>{ if(overrides[k]!==undefined) s.add(+k.split(',')[2]); });
  return [...s].sort((a,b)=>a-b);
}
function key(c,r,lv){ return c+','+r+','+(lv==null?FLOOR:lv); }
function effective(c,r,lv){
  const k = key(c,r,lv);
  if(Object.prototype.hasOwnProperty.call(overrides, k)){
    const o = overrides[k];
    if(!o || o.filename===CLEARED) return null;
    return o;
  }
  return generated[k] || null;
}
const CUSTOM_PNG = {}; // filename -> data URL from editor saves
function tilePng(fn){
  if(CUSTOM_PNG[fn]) return CUSTOM_PNG[fn];
  const t=TILE_BY_NAME[fn];
  return (t&&t.png)||('tiles/'+fn+'.png');
}

// ---- persistence (local + new unified supabase namespace) ----
const LS_KEY = 'mra_unified_v1';
function loadLocal(){
  try{
    const o = JSON.parse(localStorage.getItem(LS_KEY)||'{}');
    overrides = (o.overrides&&typeof o.overrides==='object')?o.overrides:{};
    INTERIORS = Array.isArray(o.interiors)?o.interiors:[];
    PORTALS = Array.isArray(o.portals)?o.portals:[];
    IGNORED = (o.ignored&&typeof o.ignored==='object')?o.ignored:{};
    acceptedStacks = (o.acceptedStacks&&typeof o.acceptedStacks==='object')?o.acceptedStacks:{};
  }catch(e){ overrides={}; INTERIORS=[]; PORTALS=[]; IGNORED={}; acceptedStacks={}; }
}
function saveLocal(){
  localStorage.setItem(LS_KEY, JSON.stringify({
    overrides, interiors:INTERIORS, portals:PORTALS, ignored:IGNORED, acceptedStacks
  }));
}
loadLocal();

function setOverride(c,r,lv, rec){
  const k = key(c,r,lv);
  overrides[k] = rec;
  saveLocal();
  renderCell(c,r);
  markUsed();
  scheduleReview();
  DB.upsert(c,r,lv, rec?rec.filename:CLEARED);
}
function clearOverride(c,r,lv){
  const k = key(c,r,lv);
  delete overrides[k];
  saveLocal();
  renderCell(c,r);
  markUsed();
  scheduleReview();
  // restore generated to DB if present
  const g = generated[k];
  if(g) DB.upsert(c,r,lv,g.filename);
  else DB.remove(c,r,lv);
}
function placeAt(c,r,lv, fn, meta){
  if(fn===CLEARED){ setOverride(c,r,lv,{filename:CLEARED}); return; }
  // enforce no duplicate filenames across map
  const existing = placedByFilename();
  if(existing[fn] && !(existing[fn].col===c && existing[fn].row===r && existing[fn].level===lv)){
    if(!confirm(fn.replace('.SEC','')+' is already placed at '+existing[fn].col+','+existing[fn].row+' L'+existing[fn].level+'. Move it here?')) return;
    setOverride(existing[fn].col, existing[fn].row, existing[fn].level, {filename:CLEARED});
  }
  setOverride(c,r,lv, Object.assign({
    filename:fn, col:c, row:r, level:lv, source:'override', confidence:'override',
    png:tilePng(fn), generated:false, block_id:meta&&meta.block_id||null
  }, meta||{}));
}

function placedByFilename(){
  const m={};
  for(let r=0;r<H;r++) for(let c=0;c<W;c++){
    const p=effective(c,r,FLOOR);
    // scan all floors for uniqueness
  }
  allLevels().forEach(lv=>{
    for(let r=0;r<H;r++) for(let c=0;c<W;c++){
      const p=effective(c,r,lv);
      if(p&&p.filename&&p.filename!==CLEARED) m[p.filename]={col:c,row:r,level:lv,ck:c+','+r};
    }
  });
  return m;
}
function usedFilenames(){ return new Set(Object.keys(placedByFilename())); }

// ---- grid ----
const grid = document.getElementById('grid');
function buildGrid(){
  grid.style.gridTemplateColumns = '24px repeat('+W+', var(--cell))';
  grid.innerHTML = '';
  // header row
  const corner=document.createElement('div'); corner.className='colhdr'; grid.appendChild(corner);
  COLS.forEach(c=>{ const h=document.createElement('div'); h.className='colhdr'; h.textContent=c; h.style.width='var(--cell)'; h.style.height='18px'; grid.appendChild(h); });
  ROWS.forEach(r=>{
    const rh=document.createElement('div'); rh.className='rowhdr'; rh.textContent=r; rh.style.height='var(--cell)'; grid.appendChild(rh);
    COLS.forEach(c=>grid.appendChild(makeCell(c,r)));
  });
}
function makeCell(c,r){
  const el=document.createElement('div'); el.className='cell'; el.dataset.c=c; el.dataset.r=r; CELLS[c+','+r]=el;
  el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('dragover');});
  el.addEventListener('dragleave',()=>el.classList.remove('dragover'));
  el.addEventListener('drop',e=>{
    e.preventDefault(); el.classList.remove('dragover');
    const mv=e.dataTransfer.getData('mv');
    if(mv){ const [sx,sy]=mv.split(',').map(Number);
      const single=document.getElementById('movepiece').checked;
      const byAsm=document.getElementById('moveassembly').checked;
      const cells=single?[[sx,sy]]:(byAsm?assemblyGroup(sx,sy):connectedGroup(sx,sy));
      if(cells.length) moveCells(cells,c-sx,r-sy);
      return;
    }
    const bid=e.dataTransfer.getData('block');
    if(bid){ stampBlock(bid,c,r); return; }
    const fn=e.dataTransfer.getData('fn');
    if(fn) placeAt(c,r,FLOOR,fn,{});
  });
  el.addEventListener('click',e=>{ if(e.target.classList.contains('x')) return;
    clearTimeout(el._clickT);
    el._clickT=setTimeout(()=>openEditor(c,r,e), 220); });
  el.addEventListener('dblclick',e=>{ e.preventDefault(); e.stopPropagation();
    clearTimeout(el._clickT);
    openSecEditor(c,r, effective(c,r,FLOOR)?'edit':'create'); });
  el.addEventListener('contextmenu',e=>{ e.preventDefault();
    const p=effective(c,r,FLOOR);
    if(p) setOverride(c,r,FLOOR,{filename:CLEARED});
  });
  renderCell(c,r,el);
  return el;
}
function renderCell(c,r,el){
  el=el||CELLS[c+','+r]; if(!el) return;
  [...el.querySelectorAll('img,.x,.label,.conf,.tpmark,.exitmark,.portmark,.stairmark,.guide')].forEach(n=>n.remove());
  el.classList.remove('s2011','s2006');
  const gname = SHOWGUIDES ? ((U.guide_labels||{})[c+','+r] || (U.guides||{})[c+','+r]) : null;
  if(gname){ const g=document.createElement('div'); g.className='guide'; g.textContent=gname; el.appendChild(g); }
  const p=effective(c,r,FLOOR);
  if(!p) return;
  const im=document.createElement('img'); im.src=p.png||tilePng(p.filename); im.draggable=true;
  im.addEventListener('dragstart',e=>{ e.dataTransfer.setData('mv',c+','+r); hov.style.display='none'; });
  attachHover(im, im.src, p.filename);
  el.appendChild(im);
  el.classList.add(p.source==='2006'?'s2006':'s2011');
  if(SHOWLABELS){ const lab=document.createElement('div'); lab.className='label';
    lab.textContent=(p.place_name||p.filename.replace('.SEC','')); el.appendChild(lab); }
  if(p.confidence){ const cf=document.createElement('div'); cf.className='conf '+p.confidence;
    cf.textContent=p.confidence==='2006_only'?'06':(p.confidence==='auto_stack'?'S':(p.confidence==='confirmed'?'OK':p.confidence[0].toUpperCase()));
    cf.title=p.confidence+(p.place_name?(' - '+p.place_name):''); el.appendChild(cf); }
  const x=document.createElement('div'); x.className='x'; x.textContent='x';
  x.onclick=ev=>{ ev.stopPropagation(); setOverride(c,r,FLOOR,{filename:CLEARED}); };
  el.appendChild(x);
  // transition markers
  const need=unresolvedFixedWarps(p.filename, c+','+r);
  const wps=waypointCells(p.filename);
  if(wps.length){ const tm=document.createElement('div'); tm.className='tpmark';
    tm.textContent='TP'+(wps.length>1?wps.length:''); tm.title=wps.length+' waypoint pad(s)'; el.appendChild(tm); }
  const sh=stairHint(p.filename);
  if(sh){ const sm=document.createElement('div'); sm.className='stairmark'; sm.textContent=sh.badge; sm.title=sh.title; el.appendChild(sm); }
  const np=portalsFrom(c+','+r);
  if(np.length){ const pm=document.createElement('div'); pm.className='portmark'; pm.textContent='\u2197'+(np.length>1?np.length:''); el.appendChild(pm); }
  else if(need.length){ const em=document.createElement('div'); em.className='exitmark'; em.textContent='?'+need.length; el.appendChild(em); }
}

function refreshCells(){ ROWS.forEach(r=>COLS.forEach(c=>renderCell(c,r))); }
function rebuildFloors(){
  const el=document.getElementById('floors'); el.innerHTML='';
  allLevels().forEach(lv=>{
    const b=document.createElement('button'); b.textContent=floorLabel(lv);
    if(lv===FLOOR) b.classList.add('on');
    if(lv===(U.surface_level||0)) b.title='surface';
    b.onclick=()=>{ FLOOR=lv; rebuildFloors(); refreshCells(); scheduleReview(); };
    el.appendChild(b);
  });
}

// ---- move / assembly ----
function connectedGroup(sx,sy){
  const start=effective(sx,sy,FLOOR); if(!start) return [];
  const seen=new Set([sx+','+sy]), q=[[sx,sy]], out=[];
  while(q.length){
    const [x,y]=q.pop(); out.push([x,y]);
    [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dy])=>{
      const nx=x+dx, ny=y+dy, k=nx+','+ny;
      if(seen.has(k)) return;
      if(effective(nx,ny,FLOOR)){ seen.add(k); q.push([nx,ny]); }
    });
  }
  return out;
}
function inferBlockId(fn){
  for(const b of Object.values(BLOCK_BY_ID)){
    if(b.pieces.some(p=>p.filename===fn)) return b.id;
  }
  return null;
}
function assemblyGroup(sx,sy){
  const rec=effective(sx,sy,FLOOR); if(!rec) return [];
  const bid=rec.block_id||inferBlockId(rec.filename);
  if(!bid||!BLOCK_BY_ID[bid]) return [[sx,sy]];
  const files=new Set(BLOCK_BY_ID[bid].pieces.map(p=>p.filename));
  return connectedGroup(sx,sy).filter(([x,y])=>{
    const p=effective(x,y,FLOOR); return p&&files.has(p.filename);
  });
}
function moveCells(cells,dx,dy){
  if(!dx&&!dy) return;
  const inGroup=new Set(cells.map(([x,y])=>x+','+y));
  for(const [x,y] of cells){
    const nx=x+dx, ny=y+dy;
    if(nx<0||ny<0||nx>=W||ny>=H){ alert('That move runs off the canvas.'); return; }
    const t=effective(nx,ny,FLOOR);
    if(t&&!inGroup.has(nx+','+ny)){ alert('That spot is occupied.'); return; }
  }
  const recs=cells.map(([x,y])=>[x,y,effective(x,y,FLOOR)]);
  recs.forEach(([x,y])=> setOverride(x,y,FLOOR,{filename:CLEARED}));
  recs.forEach(([x,y,rec])=>{
    if(!rec) return;
    placeAt(x+dx,y+dy,FLOOR,rec.filename, Object.assign({},rec,{col:x+dx,row:y+dy,level:FLOOR}));
  });
  let moved=false;
  PORTALS.forEach(p=>{
    const [fx,fy]=p.from.split(',').map(Number);
    if(inGroup.has(fx+','+fy)){ p.from=(fx+dx)+','+(fy+dy); moved=true; }
  });
  if(moved) saveLocal();
  refreshCells(); markUsed(); scheduleReview();
}
function stampBlock(id,c,r){
  const b=BLOCK_BY_ID[id]; if(!b) return;
  const pieces=b.pieces;
  for(const p of pieces){
    const x=c+p.dx, y=r+p.dy;
    if(x<0||y<0||x>=W||y>=H){ alert('Block runs off the canvas.'); return; }
  }
  pieces.forEach(p=> placeAt(c+p.dx,r+p.dy,FLOOR,p.filename,{block_id:id,source:'2011',confidence:'override'}));
}

// ---- exits / portals ----
const TP_KIND={1:'waypoint',2:'room waypoint',3:'instant',4:'invisible'};
function exitKey(fn,r,c){ return fn+':'+r+','+c; }
function exitInfo(fn){ return (window.SEC_EXITS||{})[fn]||null; }
function portalsFrom(ck){ return PORTALS.filter(p=>p.from===ck); }
function isIgnored(fn,r,c){ return !!IGNORED[exitKey(fn,r,c)]; }
function ignoreExit(fn,r,c){ IGNORED[exitKey(fn,r,c)]=true; saveLocal(); }
function unignoreExit(fn,r,c){ delete IGNORED[exitKey(fn,r,c)]; saveLocal(); }
function waypointCells(fn){
  const e=exitInfo(fn); if(!e) return [];
  return e.waypoint||(e.tp||[]).filter(t=>t.k===1);
}
function fixedWarpCells(fn){
  const e=exitInfo(fn); if(!e) return [];
  return e.fixed_warp||(e.tp||[]).filter(t=>t.k===3||t.k===4);
}
function stairCells(fn,kind){
  const e=exitInfo(fn); if(!e) return [];
  if(kind==='down') return e.down||e.dn||[];
  return e[kind]||[];
}
function unresolvedFixedWarps(fn,ck){
  const cells=fixedWarpCells(fn); if(!cells.length) return [];
  const linked=new Set(portalsFrom(ck).filter(p=>p.src).map(p=>p.src.r+','+p.src.c));
  let bare=portalsFrom(ck).filter(p=>!p.src).length;
  return cells.filter(t=>{
    if(isIgnored(fn,t.r,t.c)) return false;
    if(linked.has(t.r+','+t.c)) return false;
    if(bare>0){ bare--; return false; }
    return true;
  });
}
function addPortal(fromCk,to,er,ec,src){
  const p={from:fromCk,to,enter:[er,ec],name:''};
  if(src) p.src={r:+src.r,c:+src.c,k:+(src.k||0)};
  PORTALS.push(p); saveLocal();
  const [c,r]=fromCk.split(','); renderCell(+c,+r); scheduleReview();
}
function removePortal(p){ PORTALS=PORTALS.filter(x=>x!==p); saveLocal();
  const [c,r]=p.from.split(','); renderCell(+c,+r); scheduleReview(); }
function stairHint(fn){
  const up=stairCells(fn,'up'), dn=stairCells(fn,'down'), fall=stairCells(fn,'fall');
  if(!up.length&&!dn.length&&!fall.length) return null;
  const LC=window.LEVEL_CLUSTERS||{};
  let dest='', conf='';
  const scan=list=>{
    for(const j of (list||[])){
      for(const e of (j.evidence||[])){
        if(e.up_file===fn){ dest='Floor +1 via '+e.down_file.replace('.SEC',''); conf=j.confidence; return true; }
        if(e.down_file===fn){ dest='Floor -1 via '+e.up_file.replace('.SEC',''); conf=j.confidence; return true; }
      }
    }
    return false;
  };
  for(const cl of (LC.clusters||[])) if(scan(cl.joins)) break;
  if(!dest) scan(LC.suggested_joins);
  if(!dest) scan(LC.review_joins);
  return {badge:(up.length?'\u25B2':'')+(dn.length?'\u25BC':'')+(fall.length?'F':''),
    title:(up.length?up.length+' up ':'')+(dn.length?dn.length+' down ':'')+(fall.length?fall.length+' fall ':'')+(dest?(' -> '+dest+(conf?' ['+conf+']':'')):' (needs floor review)')};
}

// ---- accept suggested stacks ----
function acceptStack(cl){
  if(!cl||!(cl.floors||[]).length) return;
  const surf=+((cl.surface_level!=null)?cl.surface_level:0);
  // Find an anchor cell from any already-placed piece in this stack
  let base=null;
  for(const fl of cl.floors){
    for(const p of (fl.pieces||[])){
      const loc=placedByFilename()[p.filename];
      if(loc){ base={col:loc.col-p.dx, row:loc.row-p.dy}; break; }
    }
    if(base) break;
  }
  if(!base){
    // park near bottom
    base={col:2,row:H-10};
  }
  cl.floors.forEach(fl=>{
    const lv = +fl.level - surf; // relative to Floor 0 surface
    (fl.pieces||[]).forEach(p=>{
      placeAt(base.col+p.dx, base.row+p.dy, lv, p.filename, {
        block_id:fl.block_id, cluster_id:cl.id, source:'2011', confidence:'auto_stack', region:cl.region
      });
    });
  });
  acceptedStacks[cl.id]=true; saveLocal();
  rebuildFloors(); refreshCells(); scheduleReview();
}

  remove(c,r,lv){ if(!this.ready) return;
    this.client.from(TABLE).delete().eq('cell', cellId(c,r,lv))
      .then(({error})=>{ if(error) console.error(error); }); },
};
document.getElementById('sync').onclick=()=>{
  const bar=document.getElementById('cfgbar');
  bar.style.display=bar.style.display==='none'?'block':'none';
  document.getElementById('cfgname').value=localStorage.getItem('mra_name')||'';
};
document.getElementById('cfgsave').onclick=()=>{
  localStorage.setItem('mra_name', document.getElementById('cfgname').value.trim()||'anon');
  document.getElementById('cfgbar').style.display='none';
  DB.connect();
};

// boot
const stats=U._meta&&U._meta.stats;
document.getElementById('legendtxt').textContent =
  'One map · '+(stats?(stats.by_source&&stats.by_source['2011']||0)+'×2011 + '+(stats.by_source&&stats.by_source['2006']||0)+'×2006':'')+
  ' · Floor 0 surface · blue=2011 green=2006';
rebuildFloors(); buildGrid(); buildPalette(); renderReview(); DB.connect();

(async function applyCustomSecSaves(){
  try{
    const all=await CustomSecs.list();
    (all||[]).forEach(s=>{
      if(s&&s.filename&&s.png){
        CUSTOM_PNG[s.filename]=s.png;
        if(!TILE_BY_NAME[s.filename]) TILE_BY_NAME[s.filename]={filename:s.filename,png:s.png,custom:true};
        else TILE_BY_NAME[s.filename].png=s.png;
      }
    });
  }catch(e){ console.warn('custom secs load failed', e); }
  const pending=CustomSecs.takePendingPlace();
  if(pending&&pending.filename!=null&&pending.col!=null){
    if(pending.png) CUSTOM_PNG[pending.filename]=pending.png;
    FLOOR=+(pending.level||0);
    placeAt(pending.col, pending.row, pending.level, pending.filename, {
      source:'custom', confidence:'custom',
      png: CUSTOM_PNG[pending.filename]||pending.png||tilePng(pending.filename),
      custom:true
    });
    rebuildFloors();
    document.getElementById('legendtxt').textContent =
      'Placed '+pending.filename.replace('.SEC','')+' at ('+pending.col+','+pending.row+') '+floorLabel(FLOOR)+'.';
  }
  refreshCells();
  markUsed();
  scheduleReview();
})();
</script>
