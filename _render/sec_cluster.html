<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MRA Interior / Cluster Editor</title>
<style>
  :root{ --bg:#16171c; --panel:#1f2128; --line:#2c2f38; --txt:#d7dae2; --accent:#5aa9ff; --cell:64px; }
  *{ box-sizing:border-box; }
  body{ margin:0; font:13px/1.4 system-ui,Segoe UI,Arial,sans-serif; background:var(--bg); color:var(--txt); }
  header{ display:flex; gap:10px; align-items:center; padding:8px 12px; background:var(--panel); border-bottom:1px solid var(--line); flex-wrap:wrap; position:sticky; top:0; z-index:20; }
  header h1{ font-size:15px; margin:0; font-weight:600; }
  header .sp{ flex:1; }
  a{ color:var(--accent); }
  button,select,input{ background:#2a2d36; color:var(--txt); border:1px solid var(--line); border-radius:6px; padding:6px 9px; font-size:13px; }
  button:hover{ border-color:var(--accent); cursor:pointer; }
  .legend{ font-size:11px; color:#9aa0ad; }
  .wrap{ display:flex; height:calc(100vh - 50px); }
  .gridpane{ flex:1; overflow:auto; padding:20px; }
  .grid{ display:grid; gap:2px; width:max-content; }
  .cell{ width:var(--cell); height:var(--cell); background:#101116; border:1px solid #23252d; position:relative; cursor:pointer; }
  .cell img{ position:absolute; inset:0; width:100%; height:100%; image-rendering:auto; }
  .cell.dragover{ background:#243; }
  .cell .x{ position:absolute; top:0; right:1px; color:#ff6b6b; display:none; z-index:3; font-size:12px; }
  .cell:hover .x{ display:block; }
  .cell .nm{ position:absolute; bottom:0; left:0; right:0; font-size:8px; background:rgba(0,0,0,.6); color:#fff; text-align:center; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; padding:1px; }
  .cell .stair{ position:absolute; top:1px; left:1px; font-size:9px; line-height:1; z-index:3; color:#3fe0e0; text-shadow:0 0 2px #000; }
  .floors,.zoom{ display:flex; gap:3px; align-items:center; }
  .floors button.on{ border-color:var(--accent); background:#143; color:#fff; }
  .palette{ width:280px; flex:none; background:var(--panel); border-left:1px solid var(--line); overflow:auto; padding:10px; }
  .chips{ display:flex; flex-wrap:wrap; gap:4px; margin:6px 0; }
  .chip{ font-size:11px; padding:3px 7px; border:1px solid var(--line); border-radius:12px; cursor:pointer; color:#c2c7d2; }
  .chip:hover,.chip.on{ border-color:var(--accent); color:#fff; background:#1c2630; }
  .tiles{ display:grid; grid-template-columns:repeat(3,1fr); gap:5px; margin-top:8px; }
  .tw{ position:relative; }
  .tw img{ width:100%; aspect-ratio:1; image-rendering:auto; border:1px solid var(--line); border-radius:3px; cursor:grab; background:#000; }
  .tw.used img{ opacity:.32; border-color:#3a7d3a; }
  .tw.used::after{ content:'\2713'; position:absolute; top:1px; right:1px; font-size:9px; width:13px; height:13px; line-height:13px; text-align:center; color:#0b1f0e; background:#67d67d; border-radius:50%; }
  .tw .nm{ font-size:8px; color:#8b93a3; text-align:center; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
  #pop{ position:fixed; z-index:50; background:var(--panel); border:1px solid var(--accent); border-radius:8px; padding:10px; width:300px; display:none; box-shadow:0 8px 28px rgba(0,0,0,.6); }
  #pop h3{ margin:0 0 6px; font-size:13px; } #pop .x2{ float:right; cursor:pointer; color:#9aa0ad; }
  #pop input{ width:100%; margin:4px 0; } #pop .ptiles{ display:grid; grid-template-columns:repeat(4,1fr); gap:5px; max-height:240px; overflow:auto; }
  #pop .pt img{ width:100%; aspect-ratio:1; image-rendering:auto; border:1px solid var(--line); border-radius:3px; cursor:pointer; }
  #pop .pt:hover img{ border-color:var(--accent); }
  #pop .pt span{ display:block; font-size:8px; color:#9aa0ad; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
</style>
</head>
<body>
<header>
  <h1>MRA Interior / Cluster Editor</h1>
  <span class="legend">cluster</span>
  <input id="cname" list="clusters" placeholder="e.g. orc" style="width:130px">
  <datalist id="clusters"></datalist>
  <span class="floors" id="floors"></span>
  <button id="marksurf" title="Mark the current floor as the surface (Flat canvas)">Surface</button>
  <span class="legend">grid</span>
  <button id="colminus">-col</button><button id="colplus">+col</button>
  <button id="rowminus">-row</button><button id="rowplus">+row</button>
  <span class="zoom"><button id="zout">-</button><span id="zlvl" class="legend">64</span><button id="zin">+</button></span>
  <span class="sp"></span>
  <span id="sync" class="legend" style="cursor:pointer" title="shared sync status - click to set handle">local only</span>
  <button id="importbtn">Import</button><input id="importfile" type="file" accept=".json" style="display:none">
  <button id="export">Export links</button>
  <a href="sec_map.html" class="legend">world map</a> <a href="sec_edit.html" class="legend">SEC editor</a>
</header>
<div id="cfgbar" style="display:none; padding:8px 12px; background:#11131a; border-bottom:1px solid var(--line);">
  <span class="legend">handle</span> <input id="cfgname" style="width:140px" placeholder="your name">
  <button id="cfgsave">Connect</button>
  <span class="legend">&nbsp;Shares interiors live via the same community project as the world map.</span>
</div>
<div class="wrap">
  <div class="gridpane"><div id="grid" class="grid"></div>
    <div class="legend" id="status" style="margin-top:10px"></div></div>
  <div class="palette">
    <div id="levelpanel" style="margin-bottom:10px"></div>
    <input id="filter" placeholder="search any SEC..." style="width:100%">
    <label class="legend" style="display:block;margin-top:6px">
      <input id="coordtoggle" type="checkbox"> include coordinate/world SECs
    </label>
    <div class="chips" id="chips"></div>
    <div class="tiles" id="pbody"></div>
  </div>
</div>
<div id="pop"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="data.js"></script>
<script src="seams.js"></script>
<script src="stairs.js"></script>
<script src="portals.js"></script>
<script src="level_clusters.js"></script>
<script>
// Integer levels: 0 = lowest, higher = above. Legacy a/b/c <-> 0/1/2.
const LEGACY_TO_LV={a:0,b:1,c:2}, LV_TO_LEGACY={0:'a',1:'b',2:'c'};
function normLevel(raw, fallback=1){
  if(raw===0||raw==='0') return 0;
  if(raw==null||raw==='') return fallback;
  const s=String(raw).toLowerCase();
  if(s in LEGACY_TO_LV) return LEGACY_TO_LV[s];
  const n=parseInt(s,10); return Number.isFinite(n)?n:fallback;
}
function levelLabel(lv){
  const leg=LV_TO_LEGACY[lv];
  return 'L'+lv+(leg?' ('+({a:'under',b:'ground',c:'upper'}[leg])+')':'');
}
let level=1, cols=6, rows=6, cell=64;
let cname='', state={}, surfaceLevel={}; // surfaceLevel[cluster]=int
const AREA=(window.MANIFEST&&MANIFEST.area?MANIFEST.area:[]).slice().sort((a,b)=>a.filename.localeCompare(b.filename));
const COORD=(window.MANIFEST&&MANIFEST.coordinate?MANIFEST.coordinate:[]).slice().sort((a,b)=>a.filename.localeCompare(b.filename));
const ALL=[...AREA,...COORD];
const TILE=({}); ALL.forEach(t=>{ if(!TILE[t.filename]) TILE[t.filename]=t; });
let INCLUDE_COORD=false;
function paletteItems(){ return INCLUDE_COORD ? ALL : AREA; }
function currentGroups(){
  const groups={};
  paletteItems().forEach(t=>{ const m=t.filename.toLowerCase().match(/^([a-z]+)/); if(m){ (groups[m[1]]=groups[m[1]]||[]).push(t); } });
  return {groups, prefixes:Object.keys(groups).filter(k=>groups[k].length>=2).sort()};
}

function key(lx,ly,lv){ return lx+','+ly+','+(lv==null?level:lv); }
function curCells(){ return state[cname]||(state[cname]={}); }
function saveLS(){ if(cname) localStorage.setItem('mra_cluster_'+cname, JSON.stringify({cells:state[cname], surface:surfaceLevel[cname]})); }
function loadLS(){ if(!cname) return;
  if(typeof DB!=='undefined' && DB.ready){ state[cname]=state[cname]||{}; return; }
  const s=localStorage.getItem('mra_cluster_'+cname);
  if(!s){ state[cname]={}; return; }
  try{
    const o=JSON.parse(s);
    if(o && o.cells){ state[cname]=o.cells; if(o.surface!=null) surfaceLevel[cname]=normLevel(o.surface,1); }
    else state[cname]=o;
    // migrate legacy a/b/c keys to integer levels
    Object.keys(state[cname]||{}).forEach(k=>{
      const parts=k.split(',');
      if(parts.length===3 && parts[2] in LEGACY_TO_LV){
        const nk=parts[0]+','+parts[1]+','+LEGACY_TO_LV[parts[2]];
        if(!state[cname][nk]) state[cname][nk]=state[cname][k];
        delete state[cname][k];
      }
    });
  }catch(e){ state[cname]={}; }
}
function clusterLevels(){
  const lv=new Set([0,1,2]);
  Object.keys(curCells()).forEach(k=>{ const parts=k.split(','); if(parts.length>=3) lv.add(normLevel(parts[2],1)); });
  const LC=window.LEVEL_CLUSTERS||{};
  [...(LC.clusters||[]),...(LC.proposed_stacks||[])].forEach(cl=>{
    if((cl.region||'').toLowerCase()!==cname) return;
    (cl.floors||[]).forEach(f=>lv.add(+f.level));
  });
  return [...lv].sort((a,b)=>a-b);
}

// ---- grid ----
const grid=document.getElementById('grid');
function buildGrid(){
  grid.style.gridTemplateColumns=`repeat(${cols}, var(--cell))`;
  grid.innerHTML='';
  for(let ly=0; ly<rows; ly++) for(let lx=0; lx<cols; lx++){
    const c=document.createElement('div'); c.className='cell'; c.dataset.lx=lx; c.dataset.ly=ly;
    c.addEventListener('dragover',e=>{e.preventDefault();c.classList.add('dragover');});
    c.addEventListener('dragleave',()=>c.classList.remove('dragover'));
    c.addEventListener('drop',e=>{e.preventDefault();c.classList.remove('dragover');
      const fn=e.dataTransfer.getData('fn'); if(fn){ place(lx,ly,fn); } });
    c.addEventListener('click',e=>{ if(e.target.classList.contains('x')) return; openPop(lx,ly,e); });
    c.addEventListener('contextmenu',e=>{ e.preventDefault(); clearCell(lx,ly); });
    grid.appendChild(c); renderCell(lx,ly,c);
  }
}
function cellEl(lx,ly){ return grid.children[ly*cols+lx]; }
function renderCell(lx,ly,c){
  c=c||cellEl(lx,ly); if(!c) return;
  [...c.querySelectorAll('img,.x,.nm,.stair')].forEach(n=>n.remove());
  const fn=curCells()[key(lx,ly)];
  if(fn){ const t=TILE[fn];
    const im=document.createElement('img'); im.src=t?t.png:('tiles/'+fn+'.png'); c.appendChild(im);
    const nm=document.createElement('div'); nm.className='nm'; nm.textContent=fn.replace('.SEC',''); c.appendChild(nm);
    const x=document.createElement('div'); x.className='x'; x.textContent='x';
    x.onclick=ev=>{ev.stopPropagation();clearCell(lx,ly);}; c.appendChild(x);
    const st=(window.STAIRS||{})[fn];
    if(st){ const s=document.createElement('div'); s.className='stair';
      s.textContent=(st.u?'\u25B2':'')+(st.d?'\u25BC':'');
      s.title='floor transition: '+(st.u?'up ':'')+(st.d?'down':''); c.appendChild(s); } }
}
function place(lx,ly,fn){ curCells()[key(lx,ly)]=fn; renderCell(lx,ly); saveLS(); markUsed(); status(); DB.upsert(cname,lx,ly,level,fn); }
function clearCell(lx,ly){ delete curCells()[key(lx,ly)]; renderCell(lx,ly); saveLS(); markUsed(); status(); DB.remove(cname,lx,ly,level); }

function applyRemote(id, row){
  const [clu, rest] = id.split(':'); if(!rest) return;
  const [lx,ly,lay] = rest.split(','); const lv=normLevel(lay,1);
  const k = lx+','+ly+','+lv;
  state[clu] = state[clu] || {};
  if(row) state[clu][k] = row.filename; else delete state[clu][k];
  if(clu===cname && lv===level){ renderCell(+lx,+ly); markUsed(); status(); }
}

// ---- floors ----
const floorsEl=document.getElementById('floors');
function rebuildFloors(){
  floorsEl.innerHTML='';
  clusterLevels().forEach(f=>{
    const b=document.createElement('button'); b.textContent=levelLabel(f);
    if(f===level) b.classList.add('on');
    if(f===(surfaceLevel[cname]??1)) b.style.outline='1px solid #67d67d';
    b.onclick=()=>{ level=f; rebuildFloors(); buildGrid(); markUsed(); status(); };
    floorsEl.appendChild(b);
  });
  const add=document.createElement('button'); add.textContent='+L'; add.title='Add a floor above the highest';
  add.onclick=()=>{ const next=Math.max(...clusterLevels())+1; level=next; rebuildFloors(); buildGrid(); };
  floorsEl.appendChild(add);
}
document.getElementById('marksurf').onclick=()=>{
  if(!cname){ alert('Name the cluster first.'); return; }
  surfaceLevel[cname]=level; saveLS(); rebuildFloors(); status();
  alert('Surface floor set to '+levelLabel(level)+'. Non-surface floors are interiors on the Flat canvas.');
};
rebuildFloors();

// ---- level-cluster review panel ----
const levelPanel=document.getElementById('levelpanel');
function acceptedKey(id){ return 'mra_level_accepted_'+id; }
function isAccepted(id){ return localStorage.getItem(acceptedKey(id))==='1'; }
function setAccepted(id,v){ if(v) localStorage.setItem(acceptedKey(id),'1'); else localStorage.removeItem(acceptedKey(id)); }
function applyStack(cl, accept){
  if(!cname){ cname=(cl.region||'').toLowerCase(); document.getElementById('cname').value=cname; }
  if((cl.region||'').toLowerCase()!==cname && !confirm('Switch cluster to "'+cl.region+'" and load this stack?')) return;
  cname=(cl.region||cname).toLowerCase(); document.getElementById('cname').value=cname;
  state[cname]=state[cname]||{};
  const surf=+((cl.surface_level!=null)?cl.surface_level:0);
  surfaceLevel[cname]=surf;
  let maxX=0,maxY=0;
  (cl.floors||[]).forEach(fl=>{
    (fl.pieces||[]).forEach(p=>{
      const lx=+p.dx, ly=+p.dy, lv=+fl.level;
      state[cname][key(lx,ly,lv)]=p.filename;
      maxX=Math.max(maxX,lx); maxY=Math.max(maxY,ly);
      DB.upsert(cname,lx,ly,lv,p.filename);
    });
  });
  cols=Math.max(cols,maxX+2); rows=Math.max(rows,maxY+2);
  if(accept) setAccepted(cl.id,true);
  saveLS(); level=surf; rebuildFloors(); buildGrid(); markUsed(); status(); renderLevelPanel();
}
function renderLevelPanel(){
  levelPanel.innerHTML='';
  const LC=window.LEVEL_CLUSTERS; if(!LC) return;
  const h=document.createElement('div'); h.className='region'; h.style.cssText='font-size:11px;color:#8b93a3;margin:0 0 4px;border-bottom:1px solid var(--line)';
  h.textContent='Floor stacks'; levelPanel.appendChild(h);
  const note=document.createElement('div'); note.className='legend'; note.style.margin='0 0 6px';
  note.textContent='Accept high-confidence joins, review single-stair options, mark surface.';
  levelPanel.appendChild(note);

  const auto=(LC.clusters||[]).filter(c=>(c.floors||[]).length>1);
  const sug=LC.proposed_stacks||[];
  const rev=LC.review_joins||[];

  function addJoinCard(title, cl, kind){
    if(isAccepted(cl.id) && kind!=='auto') return;
    const box=document.createElement('div');
    box.style.cssText='border:1px solid var(--line);border-radius:6px;padding:6px;margin:0 0 6px;background:#1a1c22';
    const t=document.createElement('div'); t.style.cssText='font-size:11px;font-weight:600;margin-bottom:4px';
    t.textContent=title; box.appendChild(t);
    const floors=(cl.floors||[]).map(f=>'L'+f.level+':'+(f.block_id||'')+' ('+(f.pieces||[]).length+')').join(' | ');
    const det=document.createElement('div'); det.className='legend'; det.textContent=floors; box.appendChild(det);
    (cl.joins||[]).forEach(j=>{
      const ev=document.createElement('div'); ev.className='legend'; ev.style.marginTop='2px';
      ev.textContent='join n='+j.matches+' ox,oy='+j.ox+','+j.oy
        +((j.evidence||[]).length?('  stairs: '+(j.evidence||[]).map(e=>e.up_file.replace('.SEC','')+'\u2191'+e.down_file.replace('.SEC','')).join(', ')):'');
      box.appendChild(ev);
    });
    const row=document.createElement('div'); row.style.cssText='display:flex;gap:4px;margin-top:6px;flex-wrap:wrap';
    const acc=document.createElement('button'); acc.textContent=kind==='auto'?'Load':'Accept';
    acc.onclick=()=>applyStack(cl,true);
    const peek=document.createElement('button'); peek.textContent='Review';
    peek.onclick=()=>{ cname=(cl.region||'').toLowerCase(); document.getElementById('cname').value=cname;
      document.getElementById('filter').value=cname; buildPalette(cname); alert('Region "'+cname+'" selected. Accept loads both floors onto the grid.'); };
    row.appendChild(acc); row.appendChild(peek);
    if(kind!=='auto'){
      const skip=document.createElement('button'); skip.textContent='Skip';
      skip.onclick=()=>{ setAccepted(cl.id,true); renderLevelPanel(); };
      row.appendChild(skip);
    }
    box.appendChild(row); levelPanel.appendChild(box);
  }
  auto.filter(c=>!cname||c.region.toLowerCase()===cname||!cname).slice(0,8).forEach(cl=>{
    addJoinCard('AUTO '+cl.region+' ['+cl.confidence+']', cl, 'auto');
  });
  sug.filter(c=>!cname||c.region.toLowerCase()===cname||!cname).slice(0,10).forEach(cl=>{
    addJoinCard('SUGGEST '+cl.region, cl, 'suggest');
  });
  // ambiguous review joins as compact list
  const rlist=rev.filter(j=>!cname||j.below.toLowerCase().includes(cname)||j.above.toLowerCase().includes(cname));
  if(rlist.length){
    const rh=document.createElement('div'); rh.className='legend'; rh.style.margin='8px 0 4px';
    rh.textContent='Ambiguous / single-stair ('+rlist.length+')'; levelPanel.appendChild(rh);
    rlist.slice(0,12).forEach(j=>{
      const row=document.createElement('div'); row.style.cssText='font-size:10px;padding:3px 0;border-bottom:1px solid var(--line);color:#c2c7d2';
      const ev=(j.evidence||[])[0];
      row.textContent=j.below+' \u2191 '+j.above+' n='+j.matches
        +(ev?('  '+ev.up_file.replace('.SEC','')+'@'+ev.up_r+','+ev.up_c+' -> '+ev.down_file.replace('.SEC','')):'');
      levelPanel.appendChild(row);
    });
  }
  if(cname){
    const acceptAll=document.createElement('button');
    acceptAll.textContent='Accept all high-confidence for '+cname;
    acceptAll.style.cssText='width:100%;margin-top:6px;font-size:11px';
    acceptAll.onclick=()=>{
      const mine=[...auto,...sug].filter(c=>c.region.toLowerCase()===cname && c.confidence!=='review');
      if(!mine.length){ alert('No auto/suggest stacks for '+cname); return; }
      mine.forEach(cl=>applyStack(cl,true));
    };
    levelPanel.appendChild(acceptAll);
  }
}
renderLevelPanel();
const pbody=document.getElementById('pbody'), chipsEl=document.getElementById('chips');
function buildChips(){
  chipsEl.innerHTML='';
  const {groups,prefixes}=currentGroups();
  prefixes.forEach(p=>{ const ch=document.createElement('span'); ch.className='chip'; ch.textContent=p+' ('+groups[p].length+')';
    ch.onclick=()=>{ document.getElementById('filter').value=p; buildPalette(p); markUsed(); }; chipsEl.appendChild(ch); });
}
function buildPalette(q=''){
  q=q.toLowerCase(); pbody.innerHTML='';
  paletteItems().filter(t=>!q||t.filename.toLowerCase().includes(q)).slice(0,180).forEach(t=>{
    const tw=document.createElement('div'); tw.className='tw'; tw.dataset.fn=t.filename;
    const im=document.createElement('img'); im.src=t.png; im.draggable=true; im.title=t.filename;
    im.addEventListener('dragstart',e=>e.dataTransfer.setData('fn',t.filename));
    const nm=document.createElement('div'); nm.className='nm'; nm.textContent=t.filename.replace('.SEC','');
    tw.appendChild(im); tw.appendChild(nm); pbody.appendChild(tw);
  });
  markUsed();
}
function markUsed(){ const used=new Set(Object.values(curCells()));
  pbody.querySelectorAll('.tw').forEach(tw=>tw.classList.toggle('used',used.has(tw.dataset.fn))); }

// ---- popover (search + place + clear) ----
const pop=document.getElementById('pop');
function openPop(lx,ly,evt){
  const fn=curCells()[key(lx,ly)];
  pop.innerHTML='';
  const h=document.createElement('h3'); h.innerHTML='<span class="x2">close</span>cell '+lx+','+ly+' ['+levelLabel(level)+']';
  pop.appendChild(h); h.querySelector('.x2').onclick=()=>pop.style.display='none';
  if(fn){ const b=document.createElement('button'); b.textContent='Clear ('+fn.replace('.SEC','')+')'; b.style.width='100%';
    b.onclick=()=>{clearCell(lx,ly);pop.style.display='none';}; pop.appendChild(b); }
  // seam suggestions: tiles whose edges match the placed neighbours
  const sugg=suggestFor(lx,ly);
  if(sugg.length){
    const lab=document.createElement('div'); lab.className='nm';
    lab.style.cssText='color:#67d67d;font-size:11px;margin:4px 0 2px'; lab.textContent='fits neighbours (seam match):';
    pop.appendChild(lab);
    const g=document.createElement('div'); g.className='ptiles';
    sugg.forEach(f=>{ const t=TILE[f]; const pt=document.createElement('div'); pt.className='pt';
      const im=document.createElement('img'); im.src=t?t.png:('tiles/'+f+'.png'); im.title=f;
      const s=document.createElement('span'); s.textContent=f.replace('.SEC','');
      pt.appendChild(im); pt.appendChild(s);
      pt.onclick=()=>{ place(lx,ly,f); pop.style.display='none'; };
      g.appendChild(pt); });
    pop.appendChild(g);
  }
  const inp=document.createElement('input'); inp.placeholder='search SEC to place...'; pop.appendChild(inp);
  const res=document.createElement('div'); pop.appendChild(res);
  function run(){ const q=inp.value.toLowerCase().trim(); res.innerHTML=''; if(!q) return;
    const g=document.createElement('div'); g.className='ptiles';
    paletteItems().filter(t=>t.filename.toLowerCase().includes(q)).slice(0,40).forEach(t=>{
      const pt=document.createElement('div'); pt.className='pt';
      const im=document.createElement('img'); im.src=t.png; im.title=t.filename;
      const s=document.createElement('span'); s.textContent=t.filename.replace('.SEC','');
      pt.appendChild(im); pt.appendChild(s);
      pt.onclick=()=>{ place(lx,ly,t.filename); pop.style.display='none'; };
      g.appendChild(pt); });
    res.appendChild(g); }
  inp.addEventListener('input',run);
  pop.style.display='block';
  pop.style.left=Math.min(evt.clientX+8, innerWidth-316)+'px';
  pop.style.top=Math.max(8, Math.min(evt.clientY+8, innerHeight-360))+'px';
  inp.focus();
}
document.addEventListener('click',e=>{ if(!pop.contains(e.target)&&!e.target.closest('.cell')) pop.style.display='none'; });

// ---- seam-based neighbour suggestions (auto-stitch helper) ----
// Reverse-index distinct edges. A tile fits EAST of P if its left edge == P.r;
// SOUTH of P if its top == P.b; etc. Edges shared by many tiles are too generic
// to be useful, so buckets larger than CAP are ignored.
const SEAM=window.SEAMS||{}, CAP=8;
const byL={},byR={},byT={},byB={};
Object.entries(SEAM).forEach(([f,r])=>{
  if(r.ld)(byL[r.l]=byL[r.l]||[]).push(f);
  if(r.rd)(byR[r.r]=byR[r.r]||[]).push(f);
  if(r.td)(byT[r.t]=byT[r.t]||[]).push(f);
  if(r.bd)(byB[r.b]=byB[r.b]||[]).push(f);
});
function bucket(idx,hash,distinct){ if(!hash||!distinct) return null; const b=idx[hash]; return (b&&b.length<=CAP)?new Set(b):null; }
function suggestFor(lx,ly){
  if(!Object.keys(SEAM).length) return [];
  const cells=curCells();
  const W=SEAM[cells[(lx-1)+','+ly+','+level]], E=SEAM[cells[(lx+1)+','+ly+','+level]],
        N=SEAM[cells[lx+','+(ly-1)+','+level]], S=SEAM[cells[lx+','+(ly+1)+','+level]];
  const cons=[];
  if(W){ const b=bucket(byL,W.r,W.rd); if(b) cons.push(b); }
  if(E){ const b=bucket(byR,E.l,E.ld); if(b) cons.push(b); }
  if(N){ const b=bucket(byT,N.b,N.bd); if(b) cons.push(b); }
  if(S){ const b=bucket(byB,S.t,S.td); if(b) cons.push(b); }
  if(!cons.length) return [];
  let cand=[...cons[0]]; for(let i=1;i<cons.length;i++) cand=cand.filter(f=>cons[i].has(f));
  const used=new Set(Object.values(cells));
  const allowed=new Set(paletteItems().map(t=>t.filename));
  return cand.filter(f=>!used.has(f)&&allowed.has(f)).slice(0,12);
}

// ---- derived links + export ----
const DIRS=[['n',0,-1],['s',0,1],['e',1,0],['w',-1,0]];
function buildLinks(){
  const links=[]; const cells=curCells();
  Object.keys(cells).forEach(k=>{ const [lx,ly,lay]=k.split(','); const F=cells[k];
    const lv=normLevel(lay,1);
    DIRS.forEach(([d,dx,dy])=>{ const nk=(+lx+dx)+','+(+ly+dy)+','+lv; if(cells[nk])
      links.push({from:F, to:cells[nk], dir:d, level:lv, layer:LV_TO_LEGACY[lv]||String(lv)}); }); });
  return links;
}
function status(){
  const cells=curCells(); const n=Object.keys(cells).length;
  const surf=surfaceLevel[cname];
  document.getElementById('status').textContent=
    cname?`cluster "${cname}": ${n} sectors, ${buildLinks().length} edge links, viewing ${levelLabel(level)}`
      +(surf!=null?`, surface=${levelLabel(surf)}`:'')+'.'
         :'Type a cluster name (or pick one) to begin. Accept proposed floor stacks from the left panel, or arrange manually.';
}
document.getElementById('export').onclick=()=>{
  if(!cname){ alert('Name the cluster first.'); return; }
  const cells=curCells();
  const surf=surfaceLevel[cname]!=null?surfaceLevel[cname]:Math.min(...clusterLevels());
  const placements=Object.entries(cells).map(([k,fn])=>{
    const [lx,ly,lay]=k.split(','); const lv=normLevel(lay,1);
    return {filename:fn, lx:+lx, ly:+ly, level:lv, layer:LV_TO_LEGACY[lv]||String(lv), surface:lv===surf};
  });
  const out={ cluster:cname, cols, rows, surface_level:surf, placements, links:buildLinks(),
    _note:'Interior stitching with integer levels (0=lowest). surface_level belongs on the Flat canvas; other floors are interiors. up/down prefer stair evidence when compiled by build_clusters.py.' };
  const blob=new Blob([JSON.stringify(out,null,1)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='cluster_'+cname+'.json'; a.click();
};
document.getElementById('importbtn').onclick=()=>document.getElementById('importfile').click();
document.getElementById('importfile').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return; const rd=new FileReader();
  rd.onload=()=>{ try{ const o=JSON.parse(rd.result);
    cname=o.cluster||cname; document.getElementById('cname').value=cname;
    cols=o.cols||cols; rows=o.rows||rows;
    if(o.surface_level!=null) surfaceLevel[cname]=normLevel(o.surface_level,1);
    state[cname]={};
    (o.placements||[]).forEach(p=>{
      const lv=p.level!=null?normLevel(p.level,1):normLevel(p.layer||'b',1);
      state[cname][p.lx+','+p.ly+','+lv]=p.filename;
    });
    saveLS(); rebuildFloors(); buildGrid(); markUsed(); status(); renderLevelPanel();
  }catch(err){ alert('Bad JSON: '+err); } };
  rd.readAsText(f);
});

// ---- shared persistence (Supabase) - same community project as world map ----
const SUPABASE_URL = "https://msnxqnqqpdwamzfbwskm.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_MjRmbztlv0wlOQXpTvoBlQ__BJobsxC";
const TABLE = "cluster_cells";
const DB = {
  client:null, ready:false, name:"anon",
  cfg(){ return {
    url: localStorage.getItem('mra_url') || SUPABASE_URL,
    key: localStorage.getItem('mra_key') || SUPABASE_ANON_KEY,
    name: localStorage.getItem('mra_name') || 'anon' }; },
  st(t){ const el=document.getElementById('sync'); el.textContent=t; el.style.color=this.ready?'#67d67d':'#9aa0ad'; },
  async connect(){
    const c=this.cfg(); this.name=c.name;
    if(!c.url||!c.key||!window.supabase){ this.ready=false; this.st('local only'); return; }
    try{
      this.client=window.supabase.createClient(c.url,c.key,{realtime:{params:{eventsPerSecond:5}}});
      const {data,error}=await this.client.from(TABLE).select('*');
      if(error) throw error;
      (data||[]).forEach(r=>applyRemote(r.id, r));
      this.client.channel('rt-'+TABLE).on('postgres_changes',{event:'*',schema:'public',table:TABLE},p=>{
        if(p.eventType==='DELETE') applyRemote(p.old.id, null); else applyRemote(p.new.id, p.new);
      }).subscribe();
      this.ready=true; this.st('shared: '+this.name+' ('+(data?data.length:0)+' cells)');
      if(cname){ buildGrid(); markUsed(); status(); }
    }catch(e){ this.ready=false; this.st('connect failed'); console.error(e); }
  },
  upsert(clu,lx,ly,lv,filename){ if(!this.ready||!clu) return;
    const lay=LV_TO_LEGACY[lv]||String(lv);
    this.client.from(TABLE).upsert({id:clu+':'+lx+','+ly+','+lay, cluster:clu, lx, ly, layer:lay,
      filename, updated_by:this.name, updated_at:new Date().toISOString()})
      .then(({error})=>{ if(error) console.error(error); }); },
  remove(clu,lx,ly,lv){ if(!this.ready||!clu) return;
    const lay=LV_TO_LEGACY[lv]||String(lv);
    this.client.from(TABLE).delete().eq('id',clu+':'+lx+','+ly+','+lay)
      .then(({error})=>{ if(error) console.error(error); }); },
};

buildChips(); buildPalette(); buildGrid(); status(); DB.connect();
